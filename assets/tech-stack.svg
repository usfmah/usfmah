  <text x="337" y="202" fill="#e6edf3" font-family="'SF Mono','Fira Code',monospace" font-size="13" font-weight="600">C++</text>
  <text x="337" y="222" fill="#8b949e" font-family="'SF Mono','Fira Code',monospace" font-size="10">Language · OOP</text>
  <rect x="337" y="232" width="30" height="4" rx="2" fill="url(#cpp)"/>

