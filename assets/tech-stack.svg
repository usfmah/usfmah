  <rect x="30" y="70" width="170" height="80" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <rect x="30" y="70" width="6" height="80" rx="3" fill="url(#js)"/>
  <text x="52" y="102" fill="#e6edf3" font-family="'SF Mono','Fira Code',monospace" font-size="13" font-weight="600">JavaScript</text>
  <text x="52" y="122" fill="#8b949e" font-family="'SF Mono','Fira Code',monospace" font-size="10">Language · ES6+</text>
  <rect x="52" y="132" width="42" height="4" rx="2" fill="url(#js)"/>

