<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg-stats" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="blue-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="purple-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d2a8ff"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffa657"/>
      <stop offset="100%" stop-color="#d29922"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="200" rx="8" fill="url(#bg-stats)" stroke="#30363d" stroke-width="1"/>

  <!-- Section title -->
  <text x="400" y="36" text-anchor="middle" fill="#e6edf3" font-family="'SF Pro','Inter',system-ui,sans-serif" font-size="18" font-weight="600" letter-spacing="1">GITHUB STATISTICS</text>
  <line x1="320" y1="46" x2="480" y2="46" stroke="#30363d" stroke-width="1"/>

  <!-- Stat cards row -->
  <!-- Total Repos -->
  <rect x="24" y="65" width="175" height="110" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <rect x="24" y="65" width="175" height="3" rx="1.5" fill="url(#blue-grad)"/>
  <text x="112" y="100" text-anchor="middle" fill="#e6edf3" font-family="'SF Mono','Fira Code',monospace" font-size="28" font-weight="700">24</text>
  <text x="112" y="120" text-anchor="middle" fill="#8b949e" font-family="'SF Pro','Inter',system-ui,sans-serif" font-size="12">Public Repositories</text>

  <!-- Stars -->
  <rect x="215" y="65" width="175" height="110" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <rect x="215" y="65" width="175" height="3" rx="1.5" fill="url(#orange-grad)"/>
  <text x="303" y="100" text-anchor="middle" fill="#e6edf3" font-family="'SF Mono','Fira Code',monospace" font-size="28" font-weight="700">47</text>
  <text x="303" y="120" text-anchor="middle" fill="#8b949e" font-family="'SF Pro','Inter',system-ui,sans-serif" font-size="12">Stars Earned</text>

  <!-- Followers -->
  <rect x="406" y="65" width="175" height="110" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <rect x="406" y="65" width="175" height="3" rx="1.5" fill="url(#purple-grad)"/>
  <text x="494" y="100" text-anchor="middle" fill="#e6edf3" font-family="'SF Mono','Fira Code',monospace" font-size="28" font-weight="700">12</text>
  <text x="494" y="120" text-anchor="middle" fill="#8b949e" font-family="'SF Pro','Inter',system-ui,sans-serif" font-size="12">Followers</text>

  <!-- Contribution streak -->
  <rect x="597" y="65" width="175" height="110" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <rect x="597" y="65" width="175" height="3" rx="1.5" fill="url(#green-grad)"/>
  <text x="685" y="100" text-anchor="middle" fill="#e6edf3" font-family="'SF Mono','Fira Code',monospace" font-size="28" font-weight="700">21</text>
  <text x="685" y="120" text-anchor="middle" fill="#8b949e" font-family="'SF Pro','Inter',system-ui,sans-serif" font-size="12">Day Streak</text>
</svg>
