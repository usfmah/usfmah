<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d2a8ff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Window background -->
  <rect x="0" y="0" width="800" height="380" rx="12" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>

  <!-- Window title bar -->
  <rect x="0" y="0" width="800" height="40" rx="12" fill="#21262d"/>
  <rect x="0" y="20" width="800" height="20" fill="#21262d"/>

  <!-- Window buttons -->
  <circle cx="20" cy="20" r="6" fill="#ff7b72"/>
  <circle cx="44" cy="20" r="6" fill="#d2a8ff"/>
  <circle cx="68" cy="20" r="6" fill="#3fb950"/>

  <!-- Terminal text -->
  <text x="400" y="26" text-anchor="middle" fill="#8b949e" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="11">/home/usfmah — bash — 80×24</text>

  <!-- Line 1 - prompt -->
  <text x="24" y="72" fill="#3fb950" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">usfmah@github</text>
  <text x="140" y="72" fill="#8b949e" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">:</text>
  <text x="148" y="72" fill="#58a6ff" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">~</text>
  <text x="164" y="72" fill="#8b949e" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">$</text>
  <text x="180" y="72" fill="#e6edf3" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">
  <tspan fill="#ffa657">cat</tspan>
  <tspan fill="#e6edf3"> whoami</tspan>
</text>

  <!-- Line 2 - output -->
  <text x="24" y="100" fill="#e6edf3" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">Backend Engineer · Node.js · Open Source</text>

  <!-- Line 3 - prompt -->
  <text x="24" y="132" fill="#3fb950" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">usfmah@github</text>
  <text x="140" y="132" fill="#8b949e" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">:</text>
  <text x="148" y="132" fill="#58a6ff" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">~</text>
  <text x="164" y="132" fill="#8b949e" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">$</text>
  <text x="180" y="132" fill="#e6edf3" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="14">
  <tspan fill="#ffa657">cat</tspan>
  <tspan fill="#e6edf3"> ~/status.json | jq .</tspan>
</text>

  <!-- JSON output block -->
  <rect x="24" y="148" width="752" height="140" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="40" y="172" fill="#8b949e" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="13">{</text>
  <text x="40" y="194" fill="#e6edf3" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="13">
  <tspan fill="#ff7b72">"status"</tspan>
  <tspan fill="#e6edf3">: </tspan>
  <tspan fill="#a5d6ff">"active"</tspan>
  <tspan fill="#e6edf3">,</tspan>
</text>
  <text x="40" y="216" fill="#e6edf3" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="13">
  <tspan fill="#ff7b72">"role"</tspan>
  <tspan fill="#e6edf3">: </tspan>
  <tspan fill="#a5d6ff">"Backend Engineer"</tspan>
  <tspan fill="#e6edf3">,</tspan>
</text>
  <text x="40" y="238" fill="#e6edf3" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="13">
  <tspan fill="#ff7b72">"stack"</tspan>
  <tspan fill="#e6edf3">: [</tspan>
  <tspan fill="#a5d6ff">"Node.js"</tspan>
  <tspan fill="#e6edf3">, </tspan>
  <tspan fill="#a5d6ff">"TypeScript"</tspan>
  <tspan fill="#e6edf3">, </tspan>
  <tspan fill="#a5d6ff">"Linux"</tspan>
  <tspan fill="#e6edf3">, </tspan>
  <tspan fill="#a5d6ff">"Open Source"</tspan>
  <tspan fill="#e6edf3">]</tspan>
</text>
  <text x="40" y="260" fill="#8b949e" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="13">
  <tspan fill="#ff7b72">"focus"</tspan>
  <tspan fill="#e6edf3">: </tspan>
  <tspan fill="#a5d6ff">"Building performant systems that scale"</tspan>
</text>
  <text x="40" y="282" fill="#8b949e" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="13">}</text>

  <!-- Blinking cursor -->
  <rect x="697" y="72" width="8" height="16" rx="1" fill="#e6edf3" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
